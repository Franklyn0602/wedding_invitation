<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juju & Frank 婚禮邀請</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Pacifico&family=Noto+Sans+TC:wght@900&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #fdf0f4;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 900;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card-main {
    max-width: 560px;
    width: 100%;
    background: linear-gradient(160deg, #fff5f7 0%, #ffffff 60%, #fff8f0 100%);
    border: 0.5px solid #f4b8c8;
    border-radius: 24px;
    padding: 2.5rem 2rem;
    position: relative;
    overflow: hidden;
  }

  .flower-deco {
    position: absolute;
    opacity: 0.1;
    font-size: 100px;
    pointer-events: none;
    line-height: 1;
  }

  .ornament {
    text-align: center;
    color: #e8a0b4;
    font-size: 20px;
    letter-spacing: 10px;
    margin-bottom: 0.5rem;
  }

  .title-en {
    font-family: 'Great Vibes', cursive;
    font-style: normal;
    font-size: 46px;
    color: #c0607a;
    text-align: center;
    line-height: 1.2;
    margin: 0.3rem 0 0;
  }

  .title-zh {
    text-align: center;
    font-size: 12px;
    color: #d48a9e;
    letter-spacing: 5px;
    margin: 0.5rem 0 1.2rem;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 1rem 0;
  }

  .divider-line {
    flex: 1;
    height: 0.5px;
    background: #f4b8c8;
  }

  .divider-icon {
    color: #e8a0b4;
    font-size: 18px;
  }

  .names {
    text-align: center;
    font-family: 'Great Vibes', cursive;
    font-size: 42px;
    color: #b05570;
    margin: 0.8rem 0 0.3rem;
  }

  .names span {
    color: #e8a0b4;
    font-size: 22px;
    margin: 0 14px;
  }

  .date-box {
    text-align: center;
    margin: 1rem 0;
  }

  .date-main {
    font-size: 22px;
    color: #c0607a;
    letter-spacing: 2px;
  }

  .date-sub {
    font-size: 12px;
    color: #d48a9e;
    letter-spacing: 4px;
    margin-top: 4px;
  }

  .countdown {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 0.8rem 0;
  }

  .count-unit {
    text-align: center;
    background: rgba(255,255,255,0.7);
    border: 0.5px solid #f4b8c8;
    border-radius: 10px;
    padding: 8px 12px;
    min-width: 52px;
  }

  .count-num {
    font-family: 'Pacifico', cursive;
    font-size: 26px;
    color: #c0607a;
    display: block;
  }

  .count-label {
    font-size: 10px;
    color: #d48a9e;
    letter-spacing: 1px;
  }

  .info-row {
    display: flex;
    gap: 10px;
    margin: 1rem 0;
  }

  .info-card {
    flex: 1;
    background: rgba(255,255,255,0.7);
    border: 0.5px solid #f4b8c8;
    border-radius: 12px;
    padding: 0.9rem 0.5rem;
    text-align: center;
  }

  .info-icon {
    font-size: 20px;
    margin-bottom: 5px;
  }

  .info-label {
    font-size: 10px;
    color: #d48a9e;
    letter-spacing: 2px;
    margin-bottom: 3px;
  }

  .info-value {
    font-size: 13px;
    color: #8b4560;
    line-height: 1.5;
  }

  .section-title {
    font-size: 12px;
    color: #c0607a;
    letter-spacing: 4px;
    text-align: center;
    margin: 1.5rem 0 1rem;
  }

  .form-area {
    background: rgba(255,255,255,0.8);
    border: 0.5px solid #f4b8c8;
    border-radius: 14px;
    padding: 1.5rem;
  }

  .form-group {
    margin-bottom: 1rem;
  }

  .form-label {
    font-size: 11px;
    color: #b07080;
    letter-spacing: 1px;
    margin-bottom: 6px;
    display: block;
  }

  .form-input {
    width: 100%;
    border: 0.5px solid #f4b8c8;
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 900;
    color: #7a3a50;
    background: rgba(255,255,255,0.95);
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus {
    border-color: #e8a0b4;
  }

  textarea.form-input {
    resize: none;
  }

  .attend-options {
    display: flex;
    gap: 8px;
  }

  .attend-btn {
    flex: 1;
    padding: 9px 4px;
    border: 0.5px solid #f4b8c8;
    border-radius: 8px;
    background: white;
    font-size: 12px;
    color: #b07080;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 900;
    transition: all 0.2s;
    text-align: center;
  }

  .attend-btn:hover {
    background: #fff0f4;
  }

  .attend-btn.active {
    background: #f9d0dc;
    border-color: #e8a0b4;
    color: #8b4560;
    font-weight: 500;
  }

  .submit-btn {
    width: 100%;
    padding: 11px;
    background: linear-gradient(135deg, #e8a0b4, #d4607a);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 900;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.2s;
  }

  .submit-btn:hover { opacity: 0.88; }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .success-msg {
    display: none;
    text-align: center;
    padding: 1.5rem 1rem;
    color: #c0607a;
  }

  .success-msg .success-icon {
    font-size: 36px;
    margin-bottom: 10px;
  }

  .success-msg .success-text {
    font-size: 16px;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .success-msg .success-sub {
    font-size: 11px;
    color: #d48a9e;
    letter-spacing: 2px;
  }

  .footer-note {
    text-align: center;
    margin-top: 1.2rem;
    font-size: 11px;
    color: #d48a9e;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div class="card-main">
  <div class="flower-deco" style="top:-15px;left:-25px">🌸</div>
  <div class="flower-deco" style="bottom:-15px;right:-25px">🌺</div>

  <div class="ornament">✦ ✦ ✦</div>
  <div class="title-en">Wedding Invitation</div>
  <div class="title-zh">誠摯邀請您參加我們的婚禮</div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-icon">♡</div>
    <div class="divider-line"></div>
  </div>

  <div class="names">Juju <span>&</span> Frank</div>
  <div style="text-align:center;font-size:11px;color:#d48a9e;letter-spacing:4px;margin-top:5px">2027 · 05 · 30</div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-icon">✿</div>
    <div class="divider-line"></div>
  </div>

  <div class="date-box">
    <div class="date-main">2027 年 05 月 30 日</div>
    <div class="date-sub">SUNDAY · 午宴 12:00</div>
  </div>

  <div id="countdown" class="countdown"></div>

  <div class="info-row">
    <div class="info-card">
      <div class="info-icon">📍</div>
      <div class="info-label">地點</div>
      <div class="info-value">待填入<br><span style="font-size:11px;color:#d48a9e">婚宴廳</span></div>
    </div>
    <div class="info-card">
      <div class="info-icon">🕐</div>
      <div class="info-label">時間</div>
      <div class="info-value">入席 11:30<br><span style="font-size:11px;color:#d48a9e">典禮 12:00</span></div>
    </div>
    <div class="info-card">
      <div class="info-icon">👗</div>
      <div class="info-label">著裝</div>
      <div class="info-value">正式服裝<br><span style="font-size:11px;color:#d48a9e">Formal Attire</span></div>
    </div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-icon">❧</div>
    <div class="divider-line"></div>
  </div>

  <div class="section-title">✦ 出席回覆 ✦</div>

  <div class="form-area">
    <div id="formContent">
      <div class="form-group">
        <label class="form-label">您的姓名</label>
        <input class="form-input" id="guestName" type="text" placeholder="請輸入姓名">
      </div>
      <div class="form-group">
        <label class="form-label">出席意願</label>
        <div class="attend-options">
          <div class="attend-btn" id="btnYes" onclick="selectAttend('Yes','我會出席')">🎉 我會出席</div>
          <div class="attend-btn" id="btnMaybe" onclick="selectAttend('Maybe','可能出席')">🤔 可能出席</div>
          <div class="attend-btn" id="btnNo" onclick="selectAttend('No','無法出席')">😔 無法出席</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">出席人數（含本人）</label>
        <input class="form-input" id="guestCount" type="number" min="1" max="10" value="1" style="width:90px">
      </div>
      <div class="form-group">
        <label class="form-label">備註（飲食需求等）</label>
        <textarea class="form-input" id="guestNote" rows="2" placeholder="如有素食、過敏等需求請告知"></textarea>
      </div>
      <button class="submit-btn" id="submitBtn" onclick="submitForm()">送出回覆</button>
    </div>

    <div class="success-msg" id="successMsg">
      <div class="success-icon">🌸</div>
      <div class="success-text">感謝您的回覆！</div>
      <div class="success-sub">期待與您共享這美好時刻</div>
    </div>
  </div>

  <div class="footer-note">如有疑問請聯絡新人</div>
  <div class="ornament" style="margin-top:1rem;font-size:16px">✦ ✦ ✦</div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbygDHk9DStPmwJaklv4GM8jffvJVSsIdzjM2ydQZGKk4n_v-OgZgFpXFZboS2HREDmukw/exec';
let attendValue = '';
let attendLabel = '';

function selectAttend(val, label) {
  attendValue = val;
  attendLabel = label;
  ['Yes','Maybe','No'].forEach(v => document.getElementById('btn'+v).classList.remove('active'));
  document.getElementById('btn'+val).classList.add('active');
}

function submitForm() {
  const name = document.getElementById('guestName').value.trim();
  const count = document.getElementById('guestCount').value || '1';
  const note = document.getElementById('guestNote').value.trim();

  if (!name) { alert('請輸入您的姓名'); return; }
  if (!attendValue) { alert('請選擇出席意願'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '送出中...';

  const cbName = 'cb_' + Date.now();
  const params = new URLSearchParams({ callback: cbName, name, attend: attendLabel, count, note });

  window[cbName] = function(res) {
    delete window[cbName];
    document.getElementById('formContent').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
  };

  const script = document.createElement('script');
  script.src = SCRIPT_URL + '?' + params.toString();
  script.onerror = function() {
    btn.disabled = false;
    btn.textContent = '送出回覆';
    alert('送出失敗，請稍後再試');
  };
  document.body.appendChild(script);
}

function updateCountdown() {
  const wedding = new Date('2027-05-30T12:00:00');
  const now = new Date();
  const diff = wedding - now;
  if (diff <= 0) {
    document.getElementById('countdown').innerHTML = '<div style="text-align:center;color:#d48a9e;font-size:12px;letter-spacing:3px">幸福已到來 🌸</div>';
    return;
  }
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  const secs = Math.floor((diff % 60000) / 1000);
  document.getElementById('countdown').innerHTML = `
    <div class="count-unit"><span class="count-num">${days}</span><span class="count-label">天</span></div>
    <div class="count-unit"><span class="count-num">${hours}</span><span class="count-label">時</span></div>
    <div class="count-unit"><span class="count-num">${mins}</span><span class="count-label">分</span></div>
    <div class="count-unit"><span class="count-num">${secs}</span><span class="count-label">秒</span></div>`;
}
updateCountdown();
setInterval(updateCountdown, 1000);
</script>
</body>
</html>
